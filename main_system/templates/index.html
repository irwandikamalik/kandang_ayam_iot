<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard IoT</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Arial;
        display: flex;
        background: #0f172a;
        color: white;
        text-align: center;
      }

      .title {
        width: 100%;
        padding: 20px;
        background: #1e293b;
        text-shadow: #000000 2px 2px 4px;
        flex-wrap: wrap;
        border-radius: 20px;
      }

      /* SIDEBAR */
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        max-width: 155px;
        height: 100%;
        background: #2b2f36;
        padding: 20px;
        transition: 0.3s;
        z-index: 1000;
        transition: 0.3s;
      }

      .sidebar h2 {
        text-align: right;
        margin-top: 14px;
        text-transform: uppercase;
        text-shadow: #000000 2px 2px 4px;
      }

      .sidebar a {
        text-align: justify;
        display: block;
        padding: 10px;
        margin: 5px 5px 5px 5px;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-size: 20px;
      }

      .sidebar a:hover {
        background: #334155;
      }
      .toggle-btn {
        position: absolute;
        top: 35px;
        right: -60px;
        z-index: 1000;
        background: #1e293b;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 20px;
        flex-wrap: wrap;
      }

      /* sidebar hidden */
      .sidebar.hide {
        transform: translateX(-100%);
      }

      /* biar content ikut geser */
      .content {
        margin-left: 200px; /* default ada sidebar */
        transition: 0.3s;
      }

      .sidebar.hide + .content {
        margin-left: 0;
      }

      /* CONTENT */
      .content {
        flex: 1;
        padding: 20px;
      }

      .control-container {
        margin: 20px auto;
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .control-container button {
        padding: 10px 20px;
        background: #22c55e;
        border: none;
        border-radius: 8px;
        color: white;
        cursor: pointer;
      }

      .switch-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
        background: #1e293b;
        padding: 10px 15px;
        border-radius: 10px;
      }

      /* switch */
      .switch {
        position: relative;
        width: 50px;
        height: 26px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        top: 0;
        right: 0;
        cursor: pointer;
        background-color: #555;
        border-radius: 30px;
        width: 100%;
        height: 100%;
        transition: 0.3s;
      }

      .slider::before {
        content: "";
        position: absolute;
        height: 20px;
        width: 20px;
        left: 3px;
        top: 3px;
        background: white;
        border-radius: 50%;
        transition: 0.3s;
      }

      /* ON state */
      input:checked + .slider {
        background: #22c55e;
      }

      input:checked + .slider::before {
        transform: translateX(24px);
      }

      /* control setpoint */
      .setpoint-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 20px;
        margin: auto;
        flex-wrap: wrap;
        border-radius: 20px;
        padding: 20px;
      }

      .setpoint-container h2 {
        width: 100%;
        text-align: center;
      }

      .setpoint-card-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .setpoint-card {
        background: #1e293b;
        padding: 15px;
        border-radius: 10px;
        width: 150px;
        text-align: center;
      }

      .setpoint-card input {
        width: 100%;
        padding: 8px;
        margin-top: 10px;
        border-radius: 5px;
        border: none;
        text-align: center;
      }

      .button-setpoint {
        background: #2438d4;
        border: none;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        width: 150px;
        height: 30px;
        margin: auto;
      }

      /* CARD */
      .card-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .card {
        background: #1e293b;
        padding: 15px;
        border-radius: 10px;
        width: 170px;
        height: 170px;
        text-align: center;
      }
      .card h3 {
        /* margin: 0 0 10px 0; */
        font-size: 20px;
        color: #f8f8f8;
      }

      .card p {
        font-size: 20%;
        color: #22c55e;
      }

      .card p {
        font-size: 30px;
        font-weight: bold;
      }

      .chart-container {
        display: flex;
        flex-direction: column;
        gap: 30px;
        width: 80%;
        height: auto;
        justify-content: center;
        margin: auto;
      }

      .chart-box {
        flex: 1; /* 🔥 biar bagi 2 sama rata */
        background: #1e293b;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        /* height: auto; */
      }


      /* CHART */
      #chart1,
      #chart2,
      #chart3 {
        width: 100% !important;
        height: 300px !important;
        max-width: 150%;
      }

      /* PAGE */
      .page {
        display: none;
      }

      .active {
        display: block;
      }

      /* TABLE */
      table {
        width: 90%;
        max-width: 1000px;
        justify-content: center;
        margin: auto;
        border-collapse: collapse;
        overflow-x: auto;
        background: #1e293b;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
      }

      th,
      td {
        padding: 12px 15px;
        border-bottom: 1px solid #444;
        font-size: 16px;
        text-align: center;
      }
      .page.active table {
        width: 100%;
        border-collapse: collapse;
      }

      @media (max-width: 1000px) {
        .toggle-btn {
          position: absolute;
          top: 25px;
          /* right: -200px; */
          z-index: 1000;
          /* background: #1e293b; */
          color: white;
          border: none;
          padding: 10px 15px;
          border-radius: 20px;
          cursor: pointer;
          font-size: 20px;
          flex-wrap: wrap;
        }

        body {
          flex-direction: column;
        }

        .content {
          padding: 10px;
        }

        .chart-container {
          flex-direction: column;
          gap: 30px;
        }

        .chart-box {
          width: 100%;
        }

        .chart-box canvas {
          height: 220px !important;
        }
      
        .chart-container {
          display: flex;
          flex-direction: column;
          gap: 30px;
          width: 95%;
          height: auto;
          justify-content: center;
          margin: auto;
        }
          
        /* CHART */
        #chart1,
        #chart2,
        #chart3 {
          width: 100% !important;
          height: 150px !important;
          max-width: 150%;
        }
      }
    </style>
  </head>

  <body>
    <!-- SIDEBAR -->
    <div class="sidebar hide">
      <button class="toggle-btn" onclick="toggleSidebar()">☰</button>
      <h2>Menu</h2>
      <a href="#" onclick="showPage('home')">🏠 Home</a>
      <a href="#" onclick="showPage('data')">📄 Data</a>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <h1 class="title">Smart Poultry Farming System</h1>

      <!-- HOME (GRAPH) -->
      <div id="home" class="page active">
        <div class="setpoint-container">
          <h2>⚙️ Set Point Control</h2>
          <div class="setpoint-card-container">
            <div class="setpoint-card">
              <h3>🌡️ Suhu</h3>
              <p>Current: <span id="currentSuhu">-</span> °C</p>
              <input type="number" id="setSuhu" placeholder="Set suhu" />
            </div>

            <div class="setpoint-card">
              <h3>💧 Humidity</h3>
              <p>Current: <span id="currentHum">-</span> %</p>
              <input type="number" id="setHum" placeholder="Set humidity" />
            </div>

            <div class="setpoint-card">
              <h3>🧪 Gas</h3>
              <p>Current: <span id="currentGas">-</span> ppm</p>
              <input type="number" id="setGas" placeholder="Set gas" />
            </div>
          </div>
          <button class="button-setpoint" onclick="setPoint()">
            💾 Set Point
          </button>
        </div>
        <div class="control-container">
          <button onclick="feedNow()">🍽️ Beri Pakan</button>

          <label class="switch-wrapper">
            <span>Mist</span>
            <label class="switch">
              <input type="checkbox" onchange="toggleMist(this)" />
              <span class="slider"></span>
            </label>
          </label>

          <label class="switch-wrapper">
            <span>Fan</span>
            <label class="switch">
              <input type="checkbox" onchange="toggleFan(this)" />
              <span class="slider"></span>
            </label>
          </label>

          <label class="switch-wrapper">
            <span>Lamp</span>
            <label class="switch">
              <input type="checkbox" onchange="toggleLamp(this)" />
              <span class="slider"></span>
            </label>
          </label>

          <label class="switch-wrapper">
            <span>Auto</span>
            <label class="switch">
              <input type="checkbox" id="autoSwitch" onchange="toggleAuto(this)" />
              <span class="slider"></span>
            </label>
          </label>
        </div>

        <div class="card-container">
          <div class="card">
            <h3>🌡️ Suhu</h3>
            <p id="suhu">-</p>
          </div>

          <div class="card">
            <h3>💧 Humidity</h3>
            <p id="humidity">-</p>
          </div>

          <div class="card">
            <h3>🧪 Gas</h3>
            <p id="gas">-</p>
          </div>
        </div>

        <div class="chart-container">
          <div class="chart-box">
            <h2>🌡️ Suhu </h2>
            <canvas id="chart1"></canvas>
          </div>
          
          <div class="chart-box">
            <h2>💧 Humidity</h2>
            <canvas id="chart2"></canvas>
          </div>
          
          <div class="chart-box">
            <h2>🧪 Gas</h2>
            <canvas id="chart3"></canvas>
          </div>

        </div>
      </div>

      <!-- DATA TABLE -->
      <div id="data" class="page">
        <h1>📄 Data Sensor</h1>

        <table>
          <thead>
            <tr>
              <th>Waktu</th>
              <th>Suhu</th>
              <th>Humidity</th>
              <th>Gas</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>

    <script>
      let chart1, chart2, chart3;
      let lastChartId = null;
      let isChartFirstLoad = true;
      let lastDataId = null;
      let isFirstLoad = true;

      async function feedNow() {
        await fetch("/feed", { method: "POST" });
      }

      async function toggleLamp(el) {
        await fetch("/lamp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ state: el.checked }),
        });
      }

      async function toggleAuto(el) {
        await fetch("/auto", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ state: el.checked }),
        });
      }

      async function toggleMist(el) {
        await fetch("/mist", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ state: el.checked }),
        });
      }

      async function toggleFan(el) {
        await fetch("/fan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ state: el.checked }),
        });
      }

      // 🔄 LOAD SETPOINT SAAT PAGE LOAD
      async function loadSetpoint() {
        try {
          const res = await fetch("/get-setpoint");
          const data = await res.json();

          // tampilkan current value
          document.getElementById("currentSuhu").innerText = data.suhu;
          document.getElementById("currentHum").innerText = data.hum;
          document.getElementById("currentGas").innerText = data.gas;
        } catch (err) {
          console.error("Gagal load setpoint:", err);
        }
      }

      
      async function loadCommand() {
        const res = await fetch("/get-command");
        const data = await res.json();

        document.getElementById("autoSwitch").checked = data.auto;
      }


      async function setPoint() {
        const suhu = document.getElementById("setSuhu").value;
        const hum = document.getElementById("setHum").value;
        const gas = document.getElementById("setGas").value;

        if (suhu === "" || hum === "" || gas === "") {
          alert("Semua field harus diisi!");
          return;
        }

        if (suhu < 0 || suhu > 100) {
          alert("Suhu tidak valid!");
          return;
        }

        if (hum < 0 || hum > 100) {
          alert("Humidity harus 0 - 100%");
          return;
        }

        if (gas < 0) {
          alert("Gas tidak boleh negatif!");
          return;
        }

        try {
          const res = await fetch("/setpoint", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ suhu, hum, gas }),
          });

          const data = await res.json();

          if (data.status === "ok") {
            alert("Setpoint berhasil disimpan ✅");

            // 🔄 reload biar update
            loadSetpoint();
          }
        } catch (err) {
          console.error(err);
        }
      }

      function toggleSidebar() {
        document.querySelector(".sidebar").classList.toggle("hide");
      }

      function showPage(pageId) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(pageId).classList.add("active");
      }

      function initChart() {
        // Chart 1 (Suhu + Humidity)
        const ctx1 = document.getElementById("chart1").getContext("2d");
        chart1 = new Chart(ctx1, {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                label: "Suhu (°C)",
                data: [],
                borderWidth: 2,
                borderColor: "orange",
              },

            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,

            scales: {
              x: {
                ticks: {
                  color: "white",
                  maxTicksLimit: 6,
                  font: {
                    size: window.innerWidth < 600 ? 8 : 12, // 🔥 fleksibel
                  },
                },
              },
              y: {
                ticks: {
                  color: "white",
                  font: {
                    size: window.innerWidth < 600 ? 8 : 12,
                  },
                },
              },
            },

            plugins: {
              legend: {
                labels: {
                  color: "white",
                  font: {
                    size: window.innerWidth < 600 ? 10 : 14, // 🔥 fleksibel
                  },
                },
              },
            },
          },
        });

        // Chart 2 (Humidity)
        const ctx2 = document.getElementById("chart2").getContext("2d");
        chart2 = new Chart(ctx2, {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                label: "Humidity (%)",
                data: [],
                borderWidth: 2,
                borderColor: "cyan",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,

            scales: {
              x: {
                ticks: {
                  color: "white",
                  maxTicksLimit: 6,
                  font: {
                    size: window.innerWidth < 600 ? 8 : 12, // 🔥 fleksibel
                  },
                },
              },
              y: {
                ticks: {
                  color: "white",
                  font: {
                    size: window.innerWidth < 600 ? 8 : 12,
                  },
                },
              },
            },

            plugins: {
              legend: {
                labels: {
                  color: "white",
                  font: {
                    size: window.innerWidth < 600 ? 10 : 14, // 🔥 fleksibel
                  },
                },
              },
            },
          },
        });
      


        // Chart 3 (Gas)
        const ctx3 = document.getElementById("chart3").getContext("2d");
        chart3 = new Chart(ctx3, {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                label: "Gas (ppm)",
                data: [],
                borderWidth: 2,
                borderColor: "red",
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,

            scales: {
              x: {
                ticks: {
                  color: "white",
                  maxTicksLimit: 6,
                  font: {
                    size: window.innerWidth < 600 ? 8 : 12, // 🔥 fleksibel
                  },
                },
              },
              y: {
                ticks: {
                  color: "white",
                  font: {
                    size: window.innerWidth < 600 ? 8 : 12,
                  },
                },
              },
            },

            plugins: {
              legend: {
                labels: {
                  color: "white",
                  font: {
                    size: window.innerWidth < 600 ? 10 : 14, // 🔥 fleksibel
                  },
                },
              },
            },
          },
        });
      }

      async function fetchData() {
        try {
          const res = await fetch("/data");
          const data = await res.json();

          if (data.length === 0) return;

          const latest = data[0];

          // ========================
          // UPDATE CARD
          // ========================
          document.getElementById("suhu").innerText =
            Number(latest.suhu).toFixed(2) + " °C";

          document.getElementById("humidity").innerText =
            Number(latest.humidity).toFixed(2) + " %";

          document.getElementById("gas").innerText =
            Number(latest.gas).toFixed(2) + " ppm";

          const tableBody = document.getElementById("table-body");

          // ========================
          // 🔥 FIRST LOAD (ISI TABLE)
          // ========================
          if (isFirstLoad) {
            tableBody.innerHTML = "";

            data.slice(0, 60).forEach((row) => {
              let tr = document.createElement("tr");
              tr.innerHTML = `
                        <td>${row.created_at}</td>
                        <td>${Number(row.suhu).toFixed(2)} °C</td>
                        <td>${Number(row.humidity).toFixed(2)} %</td>
                        <td>${Number(row.gas).toFixed(2)} ppm</td>
                    `;
              tableBody.appendChild(tr);
            });

            lastDataId = latest.id;
            isFirstLoad = false;
          }

          // ========================
          // UPDATE TABLE (DATA BARU)
          // ========================
          else if (lastDataId !== latest.id) {
            lastDataId = latest.id;

            let tr = document.createElement("tr");
            tr.innerHTML = `
                    <td>${latest.created_at}</td>
                    <td>${Number(latest.suhu).toFixed(2)} °C</td>
                    <td>${Number(latest.humidity).toFixed(2)} %</td>
                    <td>${Number(latest.gas).toFixed(2)} ppm</td>
                `;

            tableBody.prepend(tr);

            if (tableBody.rows.length > 50) {
              tableBody.deleteRow(50);
            }
          }

          // ========================
          // UPDATE CHART
          // ========================
          if (isChartFirstLoad) {
            const labels = data
              .map((d) => {
                const date = new Date(d.created_at);
                return date.toLocaleTimeString();
              })
              .reverse();

            // SUHU
            chart1.data.labels = labels;
            chart1.data.datasets[0].data = data.map(d => d.suhu).reverse();

            // HUMIDITY
            chart2.data.labels = labels;
            chart2.data.datasets[0].data = data.map(d => d.humidity).reverse();

            // GAS
            chart3.data.labels = labels;
            chart3.data.datasets[0].data = data.map(d => d.gas).reverse();

            chart1.update();
            chart2.update();
            chart3.update();


            lastChartId = latest.id;
            isChartFirstLoad = false;
          } else if (lastChartId !== latest.id) {
            lastChartId = latest.id;

            const timeLabel = new Date(latest.created_at).toLocaleTimeString(); // 🔥 samakan format

            // limit 50
            if (chart1.data.labels.length >= 60) {
              chart1.data.labels.shift();
              chart1.data.datasets[0].data.shift();

              chart2.data.labels.shift();
              chart2.data.datasets[0].data.shift();

              chart3.data.labels.shift();
              chart3.data.datasets[0].data.shift();
            }

            // push data baru
            chart1.data.labels.push(timeLabel);
            chart1.data.datasets[0].data.push(latest.suhu);

            chart2.data.labels.push(timeLabel);
            chart2.data.datasets[0].data.push(latest.humidity);

            chart3.data.labels.push(timeLabel);
            chart3.data.datasets[0].data.push(latest.gas);

            chart1.update("none");
            chart2.update("none");
            chart3.update("none");
          }
        } catch (err) {
          console.error(err);
        }
      }

      // INIT
      initChart();
      fetchData();
      loadSetpoint();
      loadCommand();
      setInterval(fetchData, 1000);
      setInterval(loadSetpoint, 5000);
    </script>
  </body>
</html>
